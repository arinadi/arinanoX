name: Build DroidDesk Image

on:
  push:
    branches: [main]
    paths:
      - 'image/**'
      - 'version.txt'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate version from commit count
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "version=1.0.${COUNT}" >> $GITHUB_OUTPUT
          echo "1.0.${COUNT}" > version.txt

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git diff --staged --quiet || git commit -m "chore: update version to 1.0.${{ steps.version.outputs.version }}" && git push

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./image
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/droiddesk:latest
            ghcr.io/${{ github.repository_owner }}/droiddesk:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
